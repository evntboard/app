version: '3.9'
services:
  db:
    image: postgres:alpine
    environment:
      - POSTGRES_DB=evntboard
      - POSTGRES_USER=tilican
      - POSTGRES_PASSWORD=1234
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tilican -d evntboard" ]
      interval: 3s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: "redis/redis-stack:latest"
    ports:
      - "6379:6379"
      - "8001:8001"
    restart: always